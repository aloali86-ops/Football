<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Футбольный трекер</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f1f5f9;font-family:-apple-system,sans-serif;color:#0f172a;padding-bottom:80px}
button,input{-webkit-appearance:none;font-family:inherit}
.hdr{background:rgba(255,255,255,0.9);border-bottom:1px solid rgba(0,0,0,0.08);padding:14px 14px 0;position:sticky;top:0;z-index:50}
.hdr-top{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.tabs{display:flex}
.tab{flex:1;padding:9px 4px;border:none;background:transparent;color:#64748b;border-bottom:2px solid transparent;cursor:pointer;font-size:12px}
.tab.on{color:#22c55e;border-bottom-color:#22c55e;background:rgba(34,197,94,0.08);font-weight:700}
.main{padding:16px 14px 0}
.card{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:14px;padding:16px;margin-bottom:12px}
.lbl{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.inp{width:100%;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:11px 12px;color:#0f172a;font-size:15px;outline:none;display:block}
.inp:focus{border-color:#22c55e}
.inp-lbl{font-size:11px;color:#64748b;margin-bottom:4px}
input[type=date]{color-scheme:dark}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sg{display:grid;grid-template-columns:1fr 36px 1fr;gap:6px;align-items:start}
.vs{text-align:center;padding-top:26px;font-size:18px;color:rgba(255,255,255,0.15)}
.fbar{height:7px;background:rgba(0,0,0,0.08);border-radius:4px;overflow:hidden;margin-top:10px}
.fbarf{height:100%;border-radius:4px}
.btn-green{width:100%;padding:15px;background:linear-gradient(135deg,#16a34a,#22c55e);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;display:block}
.btn-gray{width:100%;padding:11px;background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#64748b;font-size:14px;cursor:pointer;display:block}
.mc{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:13px;padding:13px;margin-bottom:10px}
.srow{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center;margin-bottom:10px}
.sbox{font-size:20px;font-weight:800;color:#0f172a;background:rgba(0,0,0,0.05);padding:3px 10px;border-radius:7px;letter-spacing:2px;text-align:center}
.sg5{display:grid;grid-template-columns:repeat(5,1fr);background:rgba(0,0,0,0.03);border-radius:9px;padding:8px 4px;margin-bottom:8px;text-align:center}
.acts{display:flex;gap:7px}
.btn-ed{flex:1;padding:8px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);border-radius:7px;color:#60a5fa;font-size:12px;cursor:pointer}
.btn-dl{padding:8px 12px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:7px;color:#f87171;font-size:12px;cursor:pointer}
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.scard{border-radius:13px;padding:13px;background:#fff}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:999;background:#16a34a;color:#fff;padding:10px 22px;border-radius:25px;font-size:13px;font-weight:600;box-shadow:0 4px 18px rgba(0,0,0,0.4);pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap}
.toast.on{opacity:1}
.empty{text-align:center;padding:50px 20px;color:#475569}
.hide{display:none}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="hdr">
  <div class="hdr-top">
    <span style="font-size:24px">⚽</span>
    <div>
      <div style="font-size:17px;font-weight:700;color:#0f172a">Футбольный трекер</div>
      <div style="font-size:11px;color:#64748b" id="cnt">0 матчей</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" id="t-form" onclick="goTab('form')">➕ Матч</button>
    <button class="tab" id="t-hist" onclick="goTab('hist')">📋 История</button>
    <button class="tab" id="t-stat" onclick="goTab('stat')">📊 Стат</button>
  </div>
</div>

<div class="main">

<div id="v-form">
  <div class="card">
    <div class="lbl">📅 Дата и место</div>
    <div class="g2">
      <input class="inp" type="date" id="f-date"/>
      <input class="inp" type="text" id="f-stad" placeholder="Стадион"/>
    </div>
  </div>
  <div class="card">
    <div class="lbl">⚽ Команды и счёт</div>
    <div class="sg">
      <div>
        <div style="font-size:10px;color:#64748b;font-weight:700;margin-bottom:6px">ХОЗЯЕВА</div>
        <input class="inp" type="text" id="f-ht" placeholder="Команда" style="margin-bottom:7px"/>
        <input class="inp" type="number" min="0" id="f-hg" placeholder="Голы"/>
      </div>
      <div class="vs">—</div>
      <div>
        <div style="font-size:10px;color:#64748b;font-weight:700;margin-bottom:6px">ГОСТИ</div>
        <input class="inp" type="text" id="f-at" placeholder="Команда" style="margin-bottom:7px"/>
        <input class="inp" type="number" min="0" id="f-ag" placeholder="Голы"/>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="lbl">🟨🟥 Карточки</div>
    <div class="g2">
      <div><div class="inp-lbl">🟨 Хозяева</div><input class="inp" type="number" min="0" id="f-hy" placeholder="0"/></div>
      <div><div class="inp-lbl">🟨 Гости</div><input class="inp" type="number" min="0" id="f-ay" placeholder="0"/></div>
      <div><div class="inp-lbl">🟥 Хозяева</div><input class="inp" type="number" min="0" id="f-hr" placeholder="0"/></div>
      <div><div class="inp-lbl">🟥 Гости</div><input class="inp" type="number" min="0" id="f-ar" placeholder="0"/></div>
    </div>
  </div>
  <div class="card">
    <div class="lbl">🔄 Замены</div>
    <div class="g2">
      <div><div class="inp-lbl">Хозяева</div><input class="inp" type="number" min="0" id="f-hs" placeholder="0"/></div>
      <div><div class="inp-lbl">Гости</div><input class="inp" type="number" min="0" id="f-as" placeholder="0"/></div>
    </div>
  </div>
  <div class="card">
    <div class="lbl">👥 Зрители и вместимость</div>
    <div class="g2">
      <div><div class="inp-lbl">Зрителей</div><input class="inp" type="number" min="0" id="f-att" placeholder="45000" oninput="showFill()"/></div>
      <div><div class="inp-lbl">Вместимость</div><input class="inp" type="number" min="0" id="f-cap" placeholder="60000" oninput="showFill()"/></div>
    </div>
    <div id="fillWrap" class="hide" style="margin-top:10px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
        <span style="color:#94a3b8">Заполняемость</span>
        <span id="fillLbl" style="font-weight:700"></span>
      </div>
      <div class="fbar"><div class="fbarf" id="fillBar"></div></div>
    </div>
  </div>
  <button class="btn-green" id="btnSave" onclick="doSave()">✅ Сохранить матч</button>
  <button class="btn-gray hide" id="btnCancel" onclick="doCancel()">Отмена</button>
</div>

<div id="v-hist" class="hide">
  <div id="histEmpty" class="empty hide"><div style="font-size:44px;margin-bottom:10px">⚽</div><div>Матчей пока нет</div></div>
  <div id="histList"></div>
</div>

<div id="v-stat" class="hide">
  <div id="statEmpty" class="empty hide"><div style="font-size:44px;margin-bottom:10px">📊</div><div>Добавь матчи</div></div>
  <div id="statContent"></div>
</div>

</div>

<script>
var KEY = 'ft5';
var matches = [];
var editId = null;

function loadData() {
  try {
    var r = localStorage.getItem(KEY);
    if (r) matches = JSON.parse(r);
  } catch(e) { matches = []; }
}

function saveData() {
  try {
    localStorage.setItem(KEY, JSON.stringify(matches));
  } catch(e) {}
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast on';
  setTimeout(function() { t.className = 'toast'; }, 2200);
}

function updateCount() {
  var n = matches.length;
  var s = n === 1 ? '1 матч' : (n > 1 && n < 5 ? n + ' матча' : n + ' матчей');
  document.getElementById('cnt').textContent = s;
}

function goTab(tab) {
  document.getElementById('v-form').className = tab === 'form' ? 'main' : 'main hide';
  document.getElementById('v-hist').className = tab === 'hist' ? '' : 'hide';
  document.getElementById('v-stat').className = tab === 'stat' ? '' : 'hide';
  document.getElementById('t-form').className = tab === 'form' ? 'tab on' : 'tab';
  document.getElementById('t-hist').className = tab === 'hist' ? 'tab on' : 'tab';
  document.getElementById('t-stat').className = tab === 'stat' ? 'tab on' : 'tab';
  document.getElementById('t-form').textContent = editId ? '✏️ Редакт' : '➕ Матч';
  if (tab === 'hist') renderHist();
  if (tab === 'stat') renderStat();
}

function gv(id) { return document.getElementById(id).value.trim(); }
function sv(id, v) { document.getElementById(id).value = v || ''; }

function showFill() {
  var a = parseFloat(gv('f-att'));
  var c = parseFloat(gv('f-cap'));
  var w = document.getElementById('fillWrap');
  if (a > 0 && c > 0) {
    var p = Math.min(100, Math.round(a / c * 100));
    var col = p >= 90 ? '#22c55e' : p >= 60 ? '#f59e0b' : '#ef4444';
    document.getElementById('fillLbl').textContent = p + '%';
    document.getElementById('fillLbl').style.color = col;
    document.getElementById('fillBar').style.width = p + '%';
    document.getElementById('fillBar').style.background = col;
    w.className = '';
  } else {
    w.className = 'hide';
  }
}

function doSave() {
  var date = gv('f-date');
  var ht = gv('f-ht');
  var at = gv('f-at');
  var hg = gv('f-hg');
  var ag = gv('f-ag');
  if (!date || !ht || !at || hg === '' || ag === '') {
    showToast('⚠️ Заполни все обязательные поля');
    return;
  }
  var m = {
    id: editId || Date.now(),
    date: date,
    stad: gv('f-stad'),
    ht: ht, at: at,
    hg: parseInt(hg) || 0,
    ag: parseInt(ag) || 0,
    hy: parseInt(gv('f-hy')) || 0,
    ay: parseInt(gv('f-ay')) || 0,
    hr: parseInt(gv('f-hr')) || 0,
    ar: parseInt(gv('f-ar')) || 0,
    hs: parseInt(gv('f-hs')) || 0,
    as_: parseInt(gv('f-as')) || 0,
    att: parseInt(gv('f-att')) || 0,
    cap: parseInt(gv('f-cap')) || 0
  };
  if (editId) {
    for (var i = 0; i < matches.length; i++) {
      if (matches[i].id === editId) { matches[i] = m; break; }
    }
    editId = null;
  } else {
    matches.unshift(m);
  }
  saveData();
  clearForm();
  updateCount();
  showToast('✅ Матч сохранён');
  goTab('hist');
}

function clearForm() {
  var ids = ['f-date','f-stad','f-ht','f-at','f-hg','f-ag','f-hy','f-ay','f-hr','f-ar','f-hs','f-as','f-att','f-cap'];
  for (var i = 0; i < ids.length; i++) sv(ids[i], '');
  document.getElementById('fillWrap').className = 'hide';
  document.getElementById('btnCancel').className = 'btn-gray hide';
  document.getElementById('btnSave').textContent = '✅ Сохранить матч';
  editId = null;
}

function doCancel() { clearForm(); goTab('hist'); }

function fillCol(p) { return p >= 90 ? '#22c55e' : p >= 60 ? '#f59e0b' : '#ef4444'; }
function resCol(m) { return m.hg > m.ag ? '#22c55e' : m.hg < m.ag ? '#ef4444' : '#f59e0b'; }
function resLbl(m) { return m.hg > m.ag ? 'П1' : m.hg < m.ag ? 'П2' : 'Н'; }
function getPct(m) { return m.cap > 0 && m.att > 0 ? Math.min(100, Math.round(m.att / m.cap * 100)) : null; }
function fmtN(n) { return n ? n.toLocaleString('ru-RU') : '—'; }
function fmtD(d) {
  if (!d) return '—';
  var dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('ru-RU', {day:'numeric', month:'short', year:'numeric'});
}

function editM(id) {
  var m = null;
  for (var i = 0; i < matches.length; i++) { if (matches[i].id === id) { m = matches[i]; break; } }
  if (!m) return;
  editId = id;
  sv('f-date', m.date); sv('f-stad', m.stad);
  sv('f-ht', m.ht); sv('f-at', m.at);
  sv('f-hg', m.hg); sv('f-ag', m.ag);
  sv('f-hy', m.hy); sv('f-ay', m.ay);
  sv('f-hr', m.hr); sv('f-ar', m.ar);
  sv('f-hs', m.hs); sv('f-as', m.as_);
  sv('f-att', m.att); sv('f-cap', m.cap);
  showFill();
  document.getElementById('btnCancel').className = 'btn-gray';
  document.getElementById('btnSave').textContent = '💾 Сохранить изменения';
  goTab('form');
}

function delM(id) {
  if (!confirm('Удалить матч?')) return;
  var arr = [];
  for (var i = 0; i < matches.length; i++) { if (matches[i].id !== id) arr.push(matches[i]); }
  matches = arr;
  saveData(); updateCount(); renderHist(); renderStat();
}

function renderHist() {
  var list = document.getElementById('histList');
  var empty = document.getElementById('histEmpty');
  if (!matches.length) { empty.className = 'empty'; list.innerHTML = ''; return; }
  empty.className = 'empty hide';
  var html = '';
  for (var i = 0; i < matches.length; i++) {
    var m = matches[i];
    var c = resCol(m); var l = resLbl(m); var p = getPct(m);
    var fb = '';
    if (p !== null) {
      fb = '<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px"><span style="color:#64748b">Заполняемость</span><span style="color:' + fillCol(p) + ';font-weight:700">' + p + '% · ' + fmtN(m.att) + '/' + fmtN(m.cap) + '</span></div><div class="fbar"><div class="fbarf" style="width:' + p + '%;background:' + fillCol(p) + '"></div></div></div>';
    }
    html += '<div class="mc" style="border-left:3px solid ' + c + '">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px"><span style="font-size:11px;color:#64748b">' + fmtD(m.date) + (m.stad ? ' · ' + m.stad : '') + '</span><span style="background:' + c + '22;color:' + c + ';padding:2px 7px;border-radius:5px;font-size:11px;font-weight:700">' + l + '</span></div>';
    html += '<div class="srow"><div style="font-weight:700;font-size:14px;color:#fff">' + m.ht + '</div><div class="sbox">' + m.hg + ' : ' + m.ag + '</div><div style="font-weight:700;font-size:14px;color:#0f172a;text-align:right">' + m.at + '</div></div>';
    html += '<div class="sg5">';
    html += '<div><div style="font-size:12px">⚽</div><div style="font-size:12px;font-weight:700;color:#fff">' + (m.hg+m.ag) + '</div><div style="font-size:9px;color:#475569">Голы</div></div>';
    html += '<div><div style="font-size:12px">🟨</div><div style="font-size:12px;font-weight:700;color:#fff">' + (m.hy+m.ay) + '</div><div style="font-size:9px;color:#475569">Жёлт</div></div>';
    html += '<div><div style="font-size:12px">🟥</div><div style="font-size:12px;font-weight:700;color:#fff">' + (m.hr+m.ar) + '</div><div style="font-size:9px;color:#475569">Красн</div></div>';
    html += '<div><div style="font-size:12px">🔄</div><div style="font-size:12px;font-weight:700;color:#fff">' + (m.hs+m.as_) + '</div><div style="font-size:9px;color:#475569">Замены</div></div>';
    html += '<div><div style="font-size:12px">👥</div><div style="font-size:10px;font-weight:700;color:#fff">' + (m.att ? m.att.toLocaleString('ru-RU') : '—') + '</div><div style="font-size:9px;color:#475569">Зрит</div></div>';
    html += '</div>';
    html += fb;
    html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;font-size:11px;color:#64748b;margin-bottom:9px"><span>🟨 ' + m.hy + '/' + m.ay + '</span><span>🟥 ' + m.hr + '/' + m.ar + '</span><span>🔄 ' + m.hs + '/' + m.as_ + '</span></div>';
    html += '<div class="acts"><button class="btn-ed" onclick="editM(' + m.id + ')">✏️ Изменить</button><button class="btn-dl" onclick="delM(' + m.id + ')">🗑️</button></div>';
    html += '</div>';
  }
  list.innerHTML = html;
}

function renderStat() {
  var c = document.getElementById('statContent');
  var e = document.getElementById('statEmpty');
  if (!matches.length) { e.className = 'empty'; c.innerHTML = ''; return; }
  e.className = 'empty hide';
  var tg=0,ty=0,tr=0,ts=0,ta=0;
  for (var i=0;i<matches.length;i++) {
    var m=matches[i];
    tg+=m.hg+m.ag; ty+=m.hy+m.ay; tr+=m.hr+m.ar; ts+=m.hs+m.as_; ta+=m.att;
  }
  var avgA = matches.length ? Math.round(ta/matches.length) : 0;
  var wc = [];
  for (var i=0;i<matches.length;i++) { if(matches[i].cap>0&&matches[i].att>0) wc.push(matches[i]); }
  var avgF = null;
  if (wc.length) { var sf=0; for(var i=0;i<wc.length;i++) sf+=getPct(wc[i]); avgF=Math.round(sf/wc.length); }
  var top = null;
  for (var i=0;i<matches.length;i++) { if(!top||matches[i].att>top.att) top=matches[i]; }

  var cards = [
    {e:'🏟️',l:'Матчей',v:matches.length,col:'#818cf8'},
    {e:'⚽',l:'Голов',v:tg,col:'#22c55e'},
    {e:'🟨',l:'Жёлтых',v:ty,col:'#f59e0b'},
    {e:'🟥',l:'Красных',v:tr,col:'#ef4444'},
    {e:'🔄',l:'Замен',v:ts,col:'#a78bfa'},
    {e:'👥',l:'Средн.посещ.',v:avgA.toLocaleString('ru-RU'),col:'#38bdf8'}
  ];
  if (avgF !== null) cards.push({e:'📊',l:'Средн.заполн.',v:avgF+'%',col:fillCol(avgF)});

  var html = '<div class="sg2">';
  for (var i=0;i<cards.length;i++) {
    var x=cards[i];
    html += '<div class="scard" style="border:1px solid '+x.col+'33;border-top:3px solid '+x.col+'"><div style="font-size:16px;margin-bottom:5px">'+x.e+'</div><div style="font-size:19px;font-weight:800;color:#0f172a;margin-bottom:1px">'+x.v+'</div><div style="font-size:10px;color:#64748b">'+x.l+'</div></div>';
  }
  html += '</div>';

  if (wc.length) {
    html += '<div class="card" style="margin-bottom:12px"><div class="lbl">📊 Заполняемость</div>';
    for (var i=0;i<wc.length;i++) {
      var m=wc[i]; var p=getPct(m);
      html += '<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px"><span style="color:#e2e8f0">'+m.ht+' vs '+m.at+'</span><span style="color:'+fillCol(p)+';font-weight:700">'+p+'%</span></div><div class="fbar"><div class="fbarf" style="width:'+p+'%;background:'+fillCol(p)+'"></div></div></div>';
    }
    html += '</div>';
  }

  var maxG = 1;
  for (var i=0;i<matches.length;i++) { if(matches[i].hg+matches[i].ag>maxG) maxG=matches[i].hg+matches[i].ag; }
  html += '<div class="card" style="margin-bottom:12px"><div class="lbl">⚽ Голов за матч</div>';
  for (var i=0;i<matches.length;i++) {
    var m=matches[i]; var t=m.hg+m.ag;
    html += '<div style="margin-bottom:7px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px"><span style="color:#e2e8f0">'+m.ht+' '+m.hg+':'+m.ag+' '+m.at+'</span><span style="color:#22c55e;font-weight:700">'+t+'</span></div><div class="fbar"><div class="fbarf" style="width:'+(t/maxG*100)+'%;background:linear-gradient(90deg,#16a34a,#22c55e)"></div></div></div>';
  }
  html += '</div>';

  if (top && top.att > 0) {
    html += '<div style="background:rgba(56,189,248,0.07);border:1px solid rgba(56,189,248,0.2);border-radius:13px;padding:14px"><div style="font-size:12px;color:#38bdf8;margin-bottom:7px;font-weight:600">🏆 Рекорд посещаемости</div><div style="font-size:19px;font-weight:800;color:#0f172a">'+top.att.toLocaleString('ru-RU')+' зрителей</div><div style="font-size:12px;color:#94a3b8;margin-top:3px">'+top.ht+' '+top.hg+':'+top.ag+' '+top.at+(top.stad?' · '+top.stad:'')+'</div></div>';
  }
  c.innerHTML = html;
}

loadData();
updateCount();
</script>
</body>
</html>
